<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Dashboard</title>
  <style>
    /* ── Reset & Base ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface2:    #22263a;
      --border:      #2e3350;
      --accent:      #4f8ef7;
      --accent-dark: #3a6fd8;
      --danger:      #e05c5c;
      --danger-dark: #c04444;
      --success:     #4cbb8a;
      --text:        #e2e6f3;
      --text-muted:  #7a82a6;
      --radius:      10px;
      --sidebar-w:   260px;
      --font:        'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-header h2 {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    #btn-refresh {
      width: 100%;
      padding: 7px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.82rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }
    #btn-refresh:hover { background: var(--border); }
    #btn-refresh svg { flex-shrink: 0; }

    #table-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .table-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      gap: 8px;
    }
    .table-item:hover { background: var(--surface2); }
    .table-item.active {
      background: var(--surface2);
      border-left-color: var(--accent);
    }

    .table-item-name {
      font-size: 0.84rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-delete-table {
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
    }
    .btn-delete-table:hover { color: var(--danger); background: rgba(224,92,92,0.12); }

    .sidebar-empty {
      padding: 24px 16px;
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Main Content ───────────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topbar {
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #topbar h1 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
    }

    #topbar .logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #content {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    /* ── Upload Zone ────────────────────────────────────────────────────────── */
    #upload-section { margin-bottom: 32px; }

    #upload-section h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 28px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #drop-zone:hover,
    #drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(79, 142, 247, 0.06);
    }

    #drop-zone svg { color: var(--accent); margin-bottom: 12px; }

    #drop-zone p { font-size: 0.9rem; color: var(--text-muted); }
    #drop-zone p strong { color: var(--text); }

    #file-input { display: none; }

    #btn-browse {
      margin-top: 14px;
      padding: 8px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    #btn-browse:hover { background: var(--accent-dark); }

    /* ── Progress ───────────────────────────────────────────────────────────── */
    #upload-status {
      margin-top: 16px;
      display: none;
    }

    .status-bar-wrap {
      background: var(--surface2);
      border-radius: 100px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .status-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 100px;
      width: 0%;
      transition: width 0.3s;
    }

    .status-text {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    /* ── Alert ──────────────────────────────────────────────────────────────── */
    #alert-box {
      display: none;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      margin-bottom: 20px;
      border: 1px solid transparent;
    }
    #alert-box.success {
      background: rgba(76, 187, 138, 0.12);
      border-color: var(--success);
      color: var(--success);
    }
    #alert-box.error {
      background: rgba(224, 92, 92, 0.12);
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ── Preview Table ──────────────────────────────────────────────────────── */
    #preview-section { display: none; }

    #preview-section h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #preview-section h3 span.table-badge {
      background: var(--accent);
      color: #fff;
      padding: 2px 10px;
      border-radius: 100px;
      font-size: 0.75rem;
      text-transform: none;
      letter-spacing: 0;
    }

    #preview-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    thead tr {
      background: var(--surface2);
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }

    td {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover { background: var(--surface2); }

    /* ── Scrollbar styling ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Modal / Confirm ────────────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.show { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      max-width: 400px;
      width: 90%;
    }
    #modal h4 { font-size: 1rem; margin-bottom: 10px; }
    #modal p  { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 22px; }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    .btn-cancel {
      padding: 8px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: var(--border); }

    .btn-confirm-delete {
      padding: 8px 18px;
      background: var(--danger);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-confirm-delete:hover { background: var(--danger-dark); }

    /* ── Spinner ────────────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ─────────────────────────────────────────────────────────── */
    @media (max-width: 680px) {
      #sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Sidebar ────────────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div id="sidebar-header">
    <h2>Tables</h2>
    <button id="btn-refresh" title="Refresh table list">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Refresh
    </button>
  </div>
  <div id="table-list">
    <p class="sidebar-empty">No tables yet.</p>
  </div>
</aside>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<div id="main">
  <div id="topbar">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="5" rx="9" ry="3"/>
        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
      </svg>
    </div>
    <h1>CSV Dashboard</h1>
  </div>

  <div id="content">

    <!-- Alert -->
    <div id="alert-box"></div>

    <!-- Upload Section -->
    <section id="upload-section">
      <h3>Import CSV</h3>

      <div id="drop-zone">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
        <p><strong>Drag &amp; drop a CSV file here</strong></p>
        <p>or click below to browse</p>
        <button id="btn-browse" type="button">Browse File</button>
        <input type="file" id="file-input" accept=".csv,text/csv" />
      </div>

      <div id="upload-status">
        <div class="status-bar-wrap">
          <div class="status-bar-fill" id="progress-fill"></div>
        </div>
        <div class="status-text" id="status-text">Uploading…</div>
      </div>
    </section>

    <!-- Preview Section -->
    <section id="preview-section">
      <h3>
        Preview
        <span class="table-badge" id="preview-table-name"></span>
      </h3>
      <p id="preview-meta"></p>
      <div class="table-wrap">
        <table id="preview-table">
          <thead id="preview-thead"></thead>
          <tbody id="preview-tbody"></tbody>
        </table>
      </div>
    </section>

  </div><!-- /content -->
</div><!-- /main -->

<!-- ── Confirm Modal ──────────────────────────────────────────────────────── -->
<div id="modal-overlay">
  <div id="modal">
    <h4>Delete Table</h4>
    <p id="modal-msg">Are you sure you want to drop this table? This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-confirm-delete" id="modal-confirm">Delete</button>
    </div>
  </div>
</div>

<script>
  'use strict';

  // ── State ────────────────────────────────────────────────────────────────
  let activeTable = null;
  let pendingDelete = null;

  // ── Element refs ─────────────────────────────────────────────────────────
  const dropZone         = document.getElementById('drop-zone');
  const fileInput        = document.getElementById('file-input');
  const btnBrowse        = document.getElementById('btn-browse');
  const btnRefresh       = document.getElementById('btn-refresh');
  const tableList        = document.getElementById('table-list');
  const alertBox         = document.getElementById('alert-box');
  const uploadStatus     = document.getElementById('upload-status');
  const progressFill     = document.getElementById('progress-fill');
  const statusText       = document.getElementById('status-text');
  const previewSection   = document.getElementById('preview-section');
  const previewTableName = document.getElementById('preview-table-name');
  const previewMeta      = document.getElementById('preview-meta');
  const previewThead     = document.getElementById('preview-thead');
  const previewTbody     = document.getElementById('preview-tbody');
  const modalOverlay     = document.getElementById('modal-overlay');
  const modalMsg         = document.getElementById('modal-msg');
  const modalCancel      = document.getElementById('modal-cancel');
  const modalConfirm     = document.getElementById('modal-confirm');

  // ── Utilities ─────────────────────────────────────────────────────────────

  function showAlert(msg, type = 'error') {
    alertBox.textContent = msg;
    alertBox.className = type;
    alertBox.style.display = 'block';
    setTimeout(() => { alertBox.style.display = 'none'; }, 7000);
  }

  function setProgress(pct, text) {
    progressFill.style.width = `${pct}%`;
    statusText.textContent = text;
  }

  function renderTable(columns, rows) {
    // Build header
    const tr = document.createElement('tr');
    columns.forEach((col) => {
      const th = document.createElement('th');
      th.textContent = col;
      tr.appendChild(th);
    });
    previewThead.innerHTML = '';
    previewThead.appendChild(tr);

    // Build rows
    previewTbody.innerHTML = '';
    rows.forEach((row) => {
      const rowEl = document.createElement('tr');
      columns.forEach((col) => {
        const td = document.createElement('td');
        const val = row[col];
        td.textContent = val === null || val === undefined ? '' : val;
        td.title = td.textContent;
        rowEl.appendChild(td);
      });
      previewTbody.appendChild(rowEl);
    });
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────

  async function loadTables() {
    try {
      const res  = await fetch('/tables');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to load tables.');

      tableList.innerHTML = '';

      if (!data.tables || data.tables.length === 0) {
        tableList.innerHTML = '<p class="sidebar-empty">No tables yet.</p>';
        return;
      }

      data.tables.forEach((name) => {
        const item = document.createElement('div');
        item.className = 'table-item' + (name === activeTable ? ' active' : '');
        item.dataset.name = name;

        const nameEl = document.createElement('span');
        nameEl.className = 'table-item-name';
        nameEl.textContent = name;
        nameEl.title = name;

        const delBtn = document.createElement('button');
        delBtn.className = 'btn-delete-table';
        delBtn.title = `Delete table "${name}"`;
        delBtn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>`;

        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          openDeleteModal(name);
        });

        item.appendChild(nameEl);
        item.appendChild(delBtn);

        item.addEventListener('click', () => selectTable(name));
        tableList.appendChild(item);
      });
    } catch (err) {
      showAlert(`Could not load tables: ${err.message}`);
    }
  }

  async function selectTable(name) {
    activeTable = name;

    // Highlight sidebar item
    document.querySelectorAll('.table-item').forEach((el) => {
      el.classList.toggle('active', el.dataset.name === name);
    });

    try {
      const res  = await fetch(`/tables/${encodeURIComponent(name)}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to fetch table.');

      const rows = data.rows;
      if (!rows || rows.length === 0) {
        previewSection.style.display = 'block';
        previewTableName.textContent = name;
        previewMeta.textContent = 'Table is empty.';
        previewThead.innerHTML = '';
        previewTbody.innerHTML = '';
        return;
      }

      const columns = Object.keys(rows[0]);
      previewSection.style.display = 'block';
      previewTableName.textContent = name;
      previewMeta.textContent = `Showing ${rows.length} row${rows.length !== 1 ? 's' : ''}`;
      renderTable(columns, rows);
    } catch (err) {
      showAlert(`Could not load table "${name}": ${err.message}`);
    }
  }

  // ── Delete Modal ──────────────────────────────────────────────────────────

  function openDeleteModal(name) {
    pendingDelete = name;
    modalMsg.textContent = `Drop table "${name}"? All data will be permanently deleted.`;
    modalOverlay.classList.add('show');
  }

  function closeModal() {
    pendingDelete = null;
    modalOverlay.classList.remove('show');
  }

  modalCancel.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
  });

  modalConfirm.addEventListener('click', async () => {
    const name = pendingDelete;
    closeModal();
    if (!name) return;

    try {
      const res  = await fetch(`/tables/${encodeURIComponent(name)}`, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Delete failed.');

      showAlert(`Table "${name}" deleted.`, 'success');

      if (activeTable === name) {
        activeTable = null;
        previewSection.style.display = 'none';
      }
      await loadTables();
    } catch (err) {
      showAlert(`Delete failed: ${err.message}`);
    }
  });

  // ── Upload ────────────────────────────────────────────────────────────────

  btnBrowse.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
  });

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  function handleFile(file) {
    if (!file.name.toLowerCase().endsWith('.csv') && file.type !== 'text/csv') {
      showAlert('Please upload a CSV file.');
      return;
    }

    alertBox.style.display = 'none';
    uploadStatus.style.display = 'block';
    setProgress(0, `Uploading "${file.name}"…`);

    const formData = new FormData();
    formData.append('csvfile', file);

    const xhr = new XMLHttpRequest();

    xhr.upload.addEventListener('progress', (e) => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 80);
        setProgress(pct, `Uploading… ${pct}%`);
      }
    });

    xhr.addEventListener('load', async () => {
      setProgress(90, 'Processing…');

      let data;
      try {
        data = JSON.parse(xhr.responseText);
      } catch (_) {
        uploadStatus.style.display = 'none';
        showAlert('Server returned an unexpected response.');
        return;
      }

      if (xhr.status < 200 || xhr.status >= 300) {
        uploadStatus.style.display = 'none';
        showAlert(`Upload failed: ${data.error || 'Unknown error'}`);
        return;
      }

      setProgress(100, 'Done!');
      setTimeout(() => { uploadStatus.style.display = 'none'; }, 1200);

      showAlert(
        `Imported "${data.tableName}" — ${data.rowsInserted.toLocaleString()} rows inserted.`,
        'success'
      );

      // Show preview
      const columns = Object.keys(data.preview[0] || {});
      if (data.preview.length > 0) {
        previewSection.style.display = 'block';
        previewTableName.textContent = data.tableName;
        previewMeta.textContent = `Showing first ${data.preview.length} row${data.preview.length !== 1 ? 's' : ''} of ${data.rowsInserted.toLocaleString()} total`;
        renderTable(columns, data.preview);
      }

      activeTable = data.tableName;
      await loadTables();

      // Reset file input so the same file can be re-uploaded
      fileInput.value = '';
    });

    xhr.addEventListener('error', () => {
      uploadStatus.style.display = 'none';
      showAlert('Network error — could not reach the server.');
    });

    xhr.addEventListener('abort', () => {
      uploadStatus.style.display = 'none';
      showAlert('Upload was cancelled.');
    });

    xhr.open('POST', '/upload');
    xhr.send(formData);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  btnRefresh.addEventListener('click', loadTables);
  loadTables();
</script>
</body>
</html>
